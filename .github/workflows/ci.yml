name: Java CI with Gradle

on:
  push:
    branches: [ master ]

jobs:
  build-java:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Install Gradle
        run: sudo apt-get install gradle

      - name: Build with Gradle
        run: gradle build
